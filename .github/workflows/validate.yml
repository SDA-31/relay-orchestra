name: Validate

on:
  push:
  pull_request:

jobs:
  skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/validate.py
      - run: python3 -m unittest discover -s tests
      - run: sh -n install.sh

  python-37:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.7"
      - run: python scripts/validate.py
      - run: python -m unittest discover -s tests

  macos-installer:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sh install.sh --target agents --home "$RUNNER_TEMP/relay-home" --dry-run --json

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: .\install.ps1 --target agents --home (Join-Path $env:RUNNER_TEMP "relay-home") --dry-run --json
      - name: Test remote PowerShell bootstrap
        shell: pwsh
        run: |
          $package = Join-Path $env:RUNNER_TEMP "package\relay-orchestra-test"
          $archive = Join-Path $env:RUNNER_TEMP "relay-orchestra-test.zip"
          $testHome = Join-Path $env:RUNNER_TEMP "remote-home"
          New-Item -ItemType Directory -Path (Join-Path $package "scripts") -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $package "skills") -Force | Out-Null
          Copy-Item .\scripts\install.py (Join-Path $package "scripts\install.py")
          Copy-Item .\skills\relay-orchestra (Join-Path $package "skills\relay-orchestra") -Recurse
          Compress-Archive -Path $package -DestinationPath $archive
          $env:RELAY_ORCHESTRA_TEST_ARCHIVE = $archive
          $entryPoint = Get-Content .\install.ps1 -Raw
          & ([scriptblock]::Create($entryPoint)) -InstallerArgs @("--target", "agents", "--home", $testHome, "--dry-run", "--json")
